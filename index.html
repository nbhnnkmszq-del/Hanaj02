<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الخدمات التقنية</title>
    <style>
        body { background: #0f0f0f; color: #00ff00; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; }
        .card { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 1px solid #00ff00; max-width: 450px; margin: auto; box-shadow: 0 0 15px #00ff00; }
        .btn { display: block; background: #00ff00; color: #000; padding: 12px; margin: 15px 0; text-decoration: none; border-radius: 10px; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #ffffff; box-shadow: 0 0 20px #ffffff; }
        .rights { margin-top: 20px; font-size: 13px; color: #888; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: #fff;">خدمات استرجاع الحسابات</h2>
        <p>تواصل معي عبر المنصات التالية:</p>
        
        <!-- استبدل USERNAME بيوزرك الحقيقي -->
        <a href="t.me" class="btn">قناتي على تلجرام</a>
        <a href="tiktok.com" class="btn">حسابي تيك توك</a>
        <a href="wa.me" class="btn">واتساب المباشر</a>
        
        <div class="rights">جميع الحقوق محفوظة © 2026 | تطوير: اسمك هنا</div>
    </div>
</body>
</html>
